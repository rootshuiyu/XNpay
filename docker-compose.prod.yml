version: '3.8'

services:
  xinipay:
    build:
      context: .
      dockerfile: Dockerfile
    image: xinipay:latest
    container_name: xinipay
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xinipay-net

  postgres:
    image: postgres:16-alpine
    container_name: xinipay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xinipay
      POSTGRES_USER: xinipay
      POSTGRES_PASSWORD: "XiniPay2026Secure!"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xinipay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xinipay-net

  nginx:
    image: nginx:alpine
    container_name: xinipay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - xinipay
    networks:
      - xinipay-net

volumes:
  postgres-data:

networks:
  xinipay-net:
    driver: bridge
